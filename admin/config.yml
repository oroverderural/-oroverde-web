backend:
  name: github
  repo: oroverderural/-oroverde-web
  branch: main

media_folder: "imagenes"
public_folder: "/imagenes"
locale: "es"

collections:
  - name: "noticias"
    label: "Noticias / Blog"
    folder: "_noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime", format: "DD/MM/YYYY" }
      - { label: "Resumen", name: "excerpt", widget: "text" }
      - { label: "Emoji", name: "emoji", widget: "string", default: "🌱" }
      - { label: "Color", name: "color", widget: "select", options: ["verde", "terra", "azul"], default: "verde" }
      - { label: "Contenido", name: "body", widget: "markdown" }
      - { label: "Publicado", name: "published", widget: "boolean", default: true }
